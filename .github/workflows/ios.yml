name: iOS Lanczos compatibility build

# Production branches build an UNSIGNED Lanczos compatibility .ipa and publish
# it to the "latest" release. The recommended MetalFX Temporal channel is built
# by ios-metalfx-temporal.yml. Builds from master publish this compatibility
# variant as a stable release; other production branches keep it marked as a
# prerelease. The codex/ios-performance branch and
# its experiment branches instead
# create an ad-hoc-signed, entitlement-carrying SideStore test artifact and
# never update "latest".
#
# Two stable URLs are produced (replace OWNER/REPO with your repo):
#   .ipa    https://github.com/OWNER/REPO/releases/download/latest/OpenGothic-unsigned.ipa
#   source  https://github.com/OWNER/REPO/releases/download/latest/apps.json   (add this in SideStore)
#
# macOS runner minutes are free for PUBLIC repositories. For private repos they
# count 10x against your quota, so keep the repo public.

on:
  push:
    branches: [ master, ios, 'codex/ios-performance*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scr0.png'
  workflow_dispatch:
    inputs:
      sidestore_memory_test:
        description: 'Build only the SideStore Increased Memory Limit test artifact'
        required: false
        type: boolean
        default: false

permissions:
  contents: write          # required to create/update the Release

# All builds publish to the same "latest" release: two concurrent runs race on
# the asset upload (one sees 422 "already exists", the other 404 mid-clobber).
# Serialize per branch and drop superseded builds - only the newest commit's
# .ipa matters anyway.
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    env:
      SIDESTORE_MEMORY_TEST: ${{ startsWith(github.ref, 'refs/heads/codex/ios-performance') || (github.event_name == 'workflow_dispatch' && inputs.sidestore_memory_test) }}
      IOS_PERFORMANCE_BASELINE: ${{ startsWith(github.ref, 'refs/heads/codex/ios-performance') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ios' || (github.event_name == 'workflow_dispatch' && inputs.sidestore_memory_test) }}
      WORLD_FAR_PLANE_60000: ${{ github.ref == 'refs/heads/codex/ios-performance-far-plane-60000' }}
      DYNAMIC_DRAW_DISTANCE: ${{ (startsWith(github.ref, 'refs/heads/codex/ios-performance') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ios' || (github.event_name == 'workflow_dispatch' && inputs.sidestore_memory_test)) && github.ref != 'refs/heads/codex/ios-performance-far-plane-60000' }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build tools
        run: brew install cmake glslang

      - name: Verify pinned Tempest fork twice
        run: |
          bash ios/patches/apply-patches.sh
          bash ios/patches/apply-patches.sh

      - name: Configure (Xcode generator, iOS arm64)
        run: |
          cmake -S . -B build-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.4 \
            -DOPENGOTHIC_IOS_VERSION="1.0.${{ github.run_number }}" \
            -DOPENGOTHIC_IOS_INCREASED_MEMORY_REQUESTED="$SIDESTORE_MEMORY_TEST" \
            -DOPENGOTHIC_PERF_DIAGNOSTICS="$SIDESTORE_MEMORY_TEST" \
            -DOPENGOTHIC_NPC_ANIMATION_CULLING="$IOS_PERFORMANCE_BASELINE" \
            -DOPENGOTHIC_NPC_DIALOG_CULLING="$IOS_PERFORMANCE_BASELINE" \
            -DOPENGOTHIC_IOS_THREE_FRAMES_IN_FLIGHT="$IOS_PERFORMANCE_BASELINE" \
            -DOPENGOTHIC_GPU_EXPERIMENT_DIRECT_DRAWABLE_LAZY_SSAO="$IOS_PERFORMANCE_BASELINE" \
            -DOPENGOTHIC_GPU_EXPERIMENT_WORLD_FAR_PLANE_60000="$WORLD_FAR_PLANE_60000" \
            -DOPENGOTHIC_GPU_EXPERIMENT_DYNAMIC_DRAW_DISTANCE="$DYNAMIC_DRAW_DISTANCE"

      - name: Build (code signing disabled)
        run: |
          cmake --build build-ios --config Release -- \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned .ipa
        if: env.SIDESTORE_MEMORY_TEST != 'true'
        run: |
          APP="$(find build-ios -name '*.app' -type d | head -n1)"
          if [ -z "$APP" ]; then echo "no .app produced"; exit 1; fi
          echo "Packaging: $APP"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r OpenGothic-unsigned.ipa Payload >/dev/null

      - name: Package SideStore memory entitlement test .ipa
        if: env.SIDESTORE_MEMORY_TEST == 'true'
        run: |
          APP="$(find build-ios -name '*.app' -type d | head -n1)"
          if [ -z "$APP" ]; then echo "no .app produced"; exit 1; fi

          TEST_ROOT="$RUNNER_TEMP/opengothic-sidestore-test"
          rm -rf "$TEST_ROOT"
          mkdir -p "$TEST_ROOT/Payload"
          cp -R "$APP" "$TEST_ROOT/Payload/"
          SIGNED_APP="$(find "$TEST_ROOT/Payload" -name '*.app' -type d | head -n1)"

          codesign --force --sign - --timestamp=none \
            --entitlements ios/OpenGothic.entitlements \
            --generate-entitlement-der "$SIGNED_APP"
          codesign --verify --deep --strict "$SIGNED_APP"

          ENTITLEMENTS="$(codesign --display --entitlements :- "$SIGNED_APP" 2>&1)"
          echo "$ENTITLEMENTS"
          echo "$ENTITLEMENTS" | grep -q 'com.apple.developer.kernel.increased-memory-limit' || {
            echo "SideStore test app is missing increased-memory-limit in its input signature"
            exit 1
          }

          (cd "$TEST_ROOT" && zip -r "$GITHUB_WORKSPACE/OpenGothic-SideStore-memory-test.ipa" Payload >/dev/null)

      - name: Generate SideStore/AltStore source (apps.json)
        if: env.SIDESTORE_MEMORY_TEST != 'true'
        run: |
          VERSION="1.0.${{ github.run_number }}"
          DATE="$(date -u +%Y-%m-%d)"
          SIZE="$(stat -f%z OpenGothic-unsigned.ipa)"
          BASE="${{ github.server_url }}/${{ github.repository }}"
          RAW="${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}"
          IPA_URL="$BASE/releases/download/latest/OpenGothic-unsigned.ipa"
          cat > apps.json <<EOF
          {
            "name": "OpenGothic iOS — Lanczos Compatibility",
            "identifier": "opengothic.gothic2.source",
            "sourceURL": "$BASE/releases/download/latest/apps.json",
            "apps": [
              {
                "name": "OpenGothic Lanczos Compatibility",
                "bundleIdentifier": "opengothic.gothic2",
                "developerName": "Try (engine) · iOS port",
                "subtitle": "Compatibility build without MetalFX",
                "localizedDescription": "Lanczos compatibility variant of the unofficial OpenGothic iOS port. Use it if the recommended MetalFX Temporal build crashes or shows a device-specific graphics problem. Requires your own legally-owned Gothic II game data; no game assets are included.",
                "iconURL": "$RAW/ios/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png",
                "tintColor": "8B0000",
                "category": "games",
                "version": "$VERSION",
                "versionDate": "$DATE",
                "versionDescription": "Lanczos compatibility build $VERSION. Defaults: 30 FPS and 1024 px shadow maps.",
                "downloadURL": "$IPA_URL",
                "size": $SIZE,
                "versions": [
                  {
                    "version": "$VERSION",
                    "date": "$DATE",
                    "localizedDescription": "Lanczos compatibility build $VERSION. Defaults: 30 FPS and 1024 px shadow maps.",
                    "downloadURL": "$IPA_URL",
                    "size": $SIZE
                  }
                ]
              }
            ],
            "news": []
          }
          EOF
          echo "----- apps.json -----"; cat apps.json

      - name: Publish to GitHub Release (latest)
        if: env.SIDESTORE_MEMORY_TEST != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Unsigned Lanczos compatibility iOS build \`1.0.${{ github.run_number }}\` (commit ${{ github.sha }}).

          Use this build if the recommended MetalFX Temporal release crashes or shows a device-specific graphics problem. This compatibility variant uses the established Lanczos upscaler and does not enable MetalFX.

          The iOS profile defaults to 30 FPS and 1024 px shadow maps. Existing explicit FPS choices remain unchanged; the legacy generated 512 px shadow setting is upgraded once.

          **Download:** \`OpenGothic-unsigned.ipa\` below, then sideload with your own free Apple ID via SideStore / AltStore / Sideloadly.
          **SideStore source:** add this URL in SideStore → Sources → +
          \`${{ github.server_url }}/${{ github.repository }}/releases/download/latest/apps.json\`

          Requires your own legally-owned Gothic II data. No game assets are included."
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            RELEASE_STATUS=(--prerelease=false --latest)
          else
            RELEASE_STATUS=(--prerelease)
          fi
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest "${RELEASE_STATUS[@]}" \
              --title "OpenGothic iOS — Lanczos Compatibility" --notes "$NOTES"
            # --clobber can hit "ReleaseAsset.name already exists" (HTTP 422)
            # when a previous upload left a stale/partial asset behind. Delete
            # explicitly first, then upload fresh; retry once for API races.
            for a in OpenGothic-unsigned.ipa apps.json; do
              gh release delete-asset latest "$a" --yes || true
            done
            gh release upload latest OpenGothic-unsigned.ipa apps.json ||
              { sleep 10; gh release upload latest OpenGothic-unsigned.ipa apps.json --clobber; }
          else
            gh release create latest OpenGothic-unsigned.ipa apps.json \
              --title "OpenGothic iOS — Lanczos Compatibility" "${RELEASE_STATUS[@]}" --notes "$NOTES"
          fi

      - name: Upload .ipa artifact (backup, for logged-in users)
        if: env.SIDESTORE_MEMORY_TEST != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenGothic-ipa
          path: OpenGothic-unsigned.ipa
          if-no-files-found: error

      - name: Upload SideStore memory test artifact
        if: env.SIDESTORE_MEMORY_TEST == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenGothic-SideStore-memory-test-${{ github.run_number }}
          path: OpenGothic-SideStore-memory-test.ipa
          if-no-files-found: error
          retention-days: 14
