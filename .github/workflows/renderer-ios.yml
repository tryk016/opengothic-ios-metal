name: RendererIOS validation

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tempest_profile:
        description: 'Pinned Tempest feature profile'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - direct-drawable
          - metalfx-spatial
          - metalfx-temporal
      fault_mode:
        description: 'One-shot RendererIOS diagnostics fault mode (ON build only)'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - preview-attachment-missing
          - preview-readback-error
          - preview-fence-error-after-terminal
          - frame-fence-error-after-terminal
          - post-submit-suboptimal
          - shutdown-idle-unconfirmed-once
          - async-present-error-after-terminal

permissions:
  contents: read

concurrency:
  group: renderer-ios-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.tempest_profile || 'baseline' }}-${{ github.event_name == 'workflow_dispatch' && inputs.fault_mode || 'none' }}
  cancel-in-progress: true

jobs:
  build:
    name: iOS Release profile ${{ github.event_name == 'workflow_dispatch' && inputs.tempest_profile || 'baseline' }} diagnostics ${{ matrix.diagnostics }} fault ${{ matrix.diagnostics == 'ON' && github.event_name == 'workflow_dispatch' && inputs.fault_mode || 'none' }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        diagnostics: [ 'OFF', 'ON' ]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build prerequisites
        run: brew install cmake glslang

      - name: Verify pinned Tempest fork twice
        run: |
          bash ios/patches/apply-patches.sh
          bash ios/patches/apply-patches.sh

      - name: Configure RendererIOS
        run: |
          cmake -S . -B build-renderer-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DOPENGOTHIC_IOS_VERSION="1.0.${{ github.run_number }}" \
            -DOPENGOTHIC_GPU_EXPERIMENT_DIRECT_DRAWABLE_LAZY_SSAO="${{ github.event_name == 'workflow_dispatch' && inputs.tempest_profile == 'direct-drawable' && 'ON' || 'OFF' }}" \
            -DOPENGOTHIC_METALFX_SPATIAL="${{ github.event_name == 'workflow_dispatch' && (inputs.tempest_profile == 'metalfx-spatial' || inputs.tempest_profile == 'metalfx-temporal') && 'ON' || 'OFF' }}" \
            -DOPENGOTHIC_METALFX_TEMPORAL="${{ github.event_name == 'workflow_dispatch' && inputs.tempest_profile == 'metalfx-temporal' && 'ON' || 'OFF' }}" \
            -DOPENGOTHIC_RENDERER_IOS_DIAGNOSTICS="${{ matrix.diagnostics }}" \
            -DOPENGOTHIC_RENDERER_IOS_FAULT_MODE="${{ matrix.diagnostics == 'ON' && github.event_name == 'workflow_dispatch' && inputs.fault_mode || 'none' }}" \
            -DOPENGOTHIC_RENDERER_IOS_BUILD_SHA="${GITHUB_SHA}"

      - name: Assert legacy renderer is not in the target
        run: |
          if grep -Eq '(^|[^[:alnum:]_])renderer\.cpp([^[:alnum:]_]|$)' build-renderer-ios/Gothic2Notr.xcodeproj/project.pbxproj; then
            echo 'legacy game/graphics/renderer.cpp is still present in the RendererIOS target'
            exit 1
          fi
          grep -Eq '(^|[^[:alnum:]_])rendererios\.cpp([^[:alnum:]_]|$)' build-renderer-ios/Gothic2Notr.xcodeproj/project.pbxproj

      - name: Build iOS Release
        run: |
          cmake --build build-renderer-ios --config Release -- \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
