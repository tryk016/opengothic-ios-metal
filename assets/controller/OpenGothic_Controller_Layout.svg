<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img"
     aria-labelledby="title desc">
  <title id="title">OpenGothic controller layout for Xbox and PlayStation pads</title>
  <desc id="desc">Complete OpenGothic controller mapping with contextual combat controls, two separate radial quick-rings, tap and hold actions, and the unstuck shortcut.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091119"/>
      <stop offset="1" stop-color="#17232d"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263642"/>
      <stop offset="1" stop-color="#101a22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <style>
      .title{font:600 38px 'Segoe UI',Arial,sans-serif;fill:#f4ead4;letter-spacing:.5px}
      .subtitle{font:400 20px 'Segoe UI',Arial,sans-serif;fill:#aebbc5}
      .card{fill:#111b24;stroke:#796b4c;stroke-width:2}
      .badge{fill:#283845;stroke:#d2b66d;stroke-width:2}
      .key{font:600 16px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#f7e9c5;text-anchor:middle}
      .action{font:500 17px 'Segoe UI',Arial,sans-serif;fill:#edf1f3}
      .small{font:400 14px 'Segoe UI',Arial,sans-serif;fill:#aebbc5}
      .wire{fill:none;stroke:#d2b66d;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:.95}
      .dot{fill:#d2b66d}
      .pad{fill:url(#pad);stroke:#b9a268;stroke-width:4}
      .control{fill:#0b1218;stroke:#81909a;stroke-width:3}
      .controlText{font:600 17px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#ecf1f3;text-anchor:middle;dominant-baseline:middle}
      .footerTitle{font:600 18px 'Segoe UI',Arial,sans-serif;fill:#f7e9c5}
      .footerText{font:400 15px 'Segoe UI',Arial,sans-serif;fill:#cbd3d8}
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="860" rx="22" fill="none" stroke="#6f6247" stroke-width="2"/>
  <text x="800" y="52" class="title" text-anchor="middle">OpenGothic controller layout</text>
  <text x="800" y="82" class="subtitle" text-anchor="middle">Xbox / PlayStation · contextual Gothic controls</text>

  <!-- Controller silhouette. -->
  <g filter="url(#shadow)">
    <path class="pad" d="M620 280 C568 280 532 327 512 406 L456 606
      C438 670 493 711 540 662 L650 552 C696 579 904 579 950 552
      L1060 662 C1107 711 1162 670 1144 606 L1088 406
      C1068 327 1032 280 980 280 C931 280 897 310 860 320 H740
      C703 310 669 280 620 280 Z"/>
  </g>

  <!-- Leader lines are above the body and below the controls/cards. -->
  <g class="wire">
    <!-- LT/LB and RT/RB remain ordered, so their routes never cross. -->
    <path d="M470 144 H545 L605 221"/><path d="M470 203 H525 L605 269"/>
    <path d="M1130 144 H1055 L995 221"/><path d="M1130 203 H1075 L995 269"/>
    <path d="M470 262 H610 L744 382"/><path d="M1130 262 H990 L856 382"/>

    <!-- One bracket for Left stick/L3 and one for all four D-pad actions. -->
    <path d="M470 345 H492 V404 H470 M492 374 H535 L590 412 H646"/>
    <path d="M470 463 H492 V640 H470 M492 551 H535 L620 523 H688"/>

    <!-- Face-button routes terminate on the actual controls without crossing. -->
    <path d="M1130 345 H1080 V340 H997 V355"/>
    <path d="M1130 404 H1080 V421 H1065"/>
    <path d="M1130 463 H1080 V487 H997 V487"/>
    <path d="M1130 522 H1090 V500 H930 V421 H929"/>

    <!-- One bracket for Right stick/R3. -->
    <path d="M1130 581 H1108 V640 H1130 M1108 610 H1060 L955 545 L900 520"/>
  </g>

  <!-- Physical controls cover only the line endpoints, not their routes. -->
  <g filter="url(#shadow)">
    <rect x="570" y="245" width="150" height="48" rx="22" class="control"/>
    <rect x="880" y="245" width="150" height="48" rx="22" class="control"/>
    <rect x="600" y="202" width="90" height="38" rx="18" class="control"/>
    <rect x="910" y="202" width="90" height="38" rx="18" class="control"/>
    <text x="645" y="269" class="controlText">LB / L1</text>
    <text x="955" y="269" class="controlText">RB / R1</text>
    <text x="645" y="221" class="controlText">LT / L2</text>
    <text x="955" y="221" class="controlText">RT / R2</text>

    <circle cx="646" cy="412" r="55" class="control"/>
    <circle cx="646" cy="412" r="31" fill="#263642" stroke="#aab4ba" stroke-width="3"/>
    <text x="646" y="412" class="controlText">LS</text>

    <circle cx="900" cy="520" r="55" class="control"/>
    <circle cx="900" cy="520" r="31" fill="#263642" stroke="#aab4ba" stroke-width="3"/>
    <text x="900" y="520" class="controlText">RS</text>

    <g transform="translate(688 523)">
      <path d="M-19-62 H19 V-19 H62 V19 H19 V62 H-19 V19 H-62 V-19 H-19Z" class="control"/>
      <path d="M0-48 L-9-35 H9Z M48 0 L35-9 V9Z M0 48 L-9 35 H9Z M-48 0 L-35-9 V9Z" fill="#c8d0d4"/>
    </g>

    <g>
      <circle cx="997" cy="380" r="25" fill="#d4ae36" stroke="#f0d77d" stroke-width="3"/>
      <circle cx="1040" cy="421" r="25" fill="#b94742" stroke="#e8847d" stroke-width="3"/>
      <circle cx="954" cy="421" r="25" fill="#3f72ad" stroke="#82a9d4" stroke-width="3"/>
      <circle cx="997" cy="462" r="25" fill="#4e9b62" stroke="#8ac99a" stroke-width="3"/>
      <text x="997" y="380" class="controlText">Y</text><text x="1040" y="421" class="controlText">B</text>
      <text x="954" y="421" class="controlText">X</text><text x="997" y="462" class="controlText">A</text>
    </g>

    <rect x="744" y="365" width="48" height="34" rx="14" class="control"/>
    <rect x="808" y="365" width="48" height="34" rx="14" class="control"/>
    <text x="768" y="382" class="controlText">◧</text><text x="832" y="382" class="controlText">≡</text>
    <circle cx="800" cy="452" r="23" class="control"/>
  </g>

  <!-- Left-side mappings. -->
  <g>
    <rect x="40" y="120" width="430" height="48" rx="11" class="card"/><rect x="54" y="127" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="150" class="key">LT / L2</text><text x="195" y="139" class="action">Bow: draw / aim</text><text x="195" y="158" class="small">Melee: block</text>
    <rect x="40" y="179" width="430" height="48" rx="11" class="card"/><rect x="54" y="186" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="209" class="key">LB / L1</text><text x="195" y="198" class="action">Walk</text><text x="195" y="217" class="small">Melee: left attack</text>
    <rect x="40" y="238" width="430" height="48" rx="11" class="card"/><rect x="54" y="245" width="168" height="34" rx="17" class="badge"/>
    <text x="138" y="268" class="key">View / Share·Create</text><text x="238" y="257" class="action">Tap: Inventory</text><text x="238" y="276" class="small">Hold: Map</text>

    <rect x="40" y="297" width="430" height="48" rx="11" class="card"/><rect x="54" y="304" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="327" class="key">Left stick</text><text x="195" y="328" class="action">Move / turn</text>
    <rect x="40" y="356" width="430" height="48" rx="11" class="card"/><rect x="54" y="363" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="386" class="key">L3</text><text x="195" y="387" class="action">Sneak</text>

    <rect x="40" y="415" width="430" height="48" rx="11" class="card"/><rect x="54" y="422" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="445" class="key">D-pad ↑</text><text x="195" y="446" class="action">Items ring</text>
    <rect x="40" y="474" width="430" height="48" rx="11" class="card"/><rect x="54" y="481" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="504" class="key">D-pad ↓</text><text x="195" y="505" class="action">Weapons / Magic ring</text>
    <rect x="40" y="533" width="430" height="48" rx="11" class="card"/><rect x="54" y="540" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="563" class="key">D-pad ←</text><text x="195" y="552" class="action">Status</text><text x="195" y="571" class="small">Combat: previous target</text>
    <rect x="40" y="592" width="430" height="48" rx="11" class="card"/><rect x="54" y="599" width="125" height="34" rx="17" class="badge"/>
    <text x="116" y="622" class="key">D-pad →</text><text x="195" y="611" class="action">Quest log</text><text x="195" y="630" class="small">Combat: next target</text>
  </g>

  <!-- Right-side mappings. -->
  <g>
    <rect x="1130" y="120" width="430" height="48" rx="11" class="card"/><rect x="1144" y="127" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="150" class="key">RT / R2</text><text x="1285" y="139" class="action">Draw melee</text><text x="1285" y="158" class="small">Armed: attack / shoot / cast</text>
    <rect x="1130" y="179" width="430" height="48" rx="11" class="card"/><rect x="1144" y="186" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="209" class="key">RB / R1</text><text x="1285" y="198" class="action">Look back</text><text x="1285" y="217" class="small">Melee: right attack</text>
    <rect x="1130" y="238" width="430" height="48" rx="11" class="card"/><rect x="1144" y="245" width="145" height="34" rx="17" class="badge"/>
    <text x="1216" y="268" class="key">Menu / Options</text><text x="1305" y="269" class="action">Game menu</text>

    <rect x="1130" y="297" width="430" height="48" rx="11" class="card"/><rect x="1144" y="304" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="327" class="key">Y / △</text><text x="1285" y="328" class="action">Draw / sheathe weapon</text>
    <rect x="1130" y="356" width="430" height="48" rx="11" class="card"/><rect x="1144" y="363" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="386" class="key">B / ○</text><text x="1285" y="387" class="action">Melee special / Back</text>
    <rect x="1130" y="415" width="430" height="48" rx="11" class="card"/><rect x="1144" y="422" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="445" class="key">A / ✕</text><text x="1285" y="446" class="action">Interact / use / confirm</text>
    <rect x="1130" y="474" width="430" height="48" rx="11" class="card"/><rect x="1144" y="481" width="125" height="34" rx="17" class="badge"/>
    <text x="1206" y="504" class="key">X / □</text><text x="1285" y="505" class="action">Jump / climb</text>

    <rect x="1130" y="533" width="430" height="48" rx="11" class="card"/><rect x="1144" y="540" width="145" height="34" rx="17" class="badge"/>
    <text x="1216" y="563" class="key">Right stick</text><text x="1305" y="552" class="action">Camera</text><text x="1305" y="571" class="small">Ring: aim at a slot</text>
    <rect x="1130" y="592" width="430" height="48" rx="11" class="card"/><rect x="1144" y="599" width="145" height="34" rx="17" class="badge"/>
    <text x="1216" y="622" class="key">R3</text><text x="1305" y="623" class="action">Target lock</text>
  </g>

  <!-- The two rings are separate panels; each panel contains two concentric rows. -->
  <g>
    <rect x="70" y="700" width="705" height="72" rx="14" class="card"/>
    <text x="96" y="728" class="footerTitle">D-pad ↑ · Items ring</text>
    <text x="96" y="751" class="footerText">4 inner + 9 outer slots · potions, food and torches</text>
    <rect x="825" y="700" width="705" height="72" rx="14" class="card"/>
    <text x="851" y="728" class="footerTitle">D-pad ↓ · Weapons / Magic ring</text>
    <text x="851" y="751" class="footerText">melee + ranged inside · 7 spell-book slots outside</text>

    <rect x="475" y="792" width="650" height="48" rx="14" class="card"/>
    <text x="800" y="815" class="footerTitle" text-anchor="middle">Hold L3 + R3 (~2 s) · teleport when stuck</text>
  </g>

  <text x="800" y="867" class="small" text-anchor="middle">Open a ring with the D-pad, aim by angle and distance, then press A or RT to use the selected slot; B cancels.</text>
</svg>
