<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img"
     aria-labelledby="title desc">
  <title id="title">OpenGothic controller layout for Xbox and PlayStation pads</title>
  <desc id="desc">A controller diagram with the complete OpenGothic mapping, tap and hold actions, quick save and load combinations, and the unstuck shortcut.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091119"/>
      <stop offset="1" stop-color="#17232d"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263642"/>
      <stop offset="1" stop-color="#101a22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <style>
      .title{font:600 38px 'Segoe UI',Arial,sans-serif;fill:#f4ead4;letter-spacing:.5px}
      .subtitle{font:400 20px 'Segoe UI',Arial,sans-serif;fill:#aebbc5}
      .card{fill:#111b24;stroke:#796b4c;stroke-width:2}
      .badge{fill:#283845;stroke:#d2b66d;stroke-width:2}
      .key{font:600 17px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#f7e9c5;text-anchor:middle}
      .action{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#edf1f3}
      .small{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#aebbc5}
      .wire{fill:none;stroke:#b5a06c;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:.92}
      .dot{fill:#d2b66d}
      .pad{fill:url(#pad);stroke:#b9a268;stroke-width:4}
      .control{fill:#0b1218;stroke:#81909a;stroke-width:3}
      .controlText{font:600 17px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#ecf1f3;text-anchor:middle;dominant-baseline:middle}
      .footerKey{font:600 18px 'Segoe UI',Arial,sans-serif;fill:#f7e9c5}
      .footerAction{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#edf1f3}
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="860" rx="22" fill="none" stroke="#6f6247" stroke-width="2"/>
  <text x="800" y="58" class="title" text-anchor="middle">OpenGothic controller layout</text>
  <text x="800" y="90" class="subtitle" text-anchor="middle">Xbox / PlayStation · Gothic Classic scheme</text>

  <!-- Controller silhouette. -->
  <g filter="url(#shadow)">
    <path class="pad" d="M620 280 C568 280 532 327 512 406 L456 606
      C438 670 493 711 540 662 L650 552 C696 579 904 579 950 552
      L1060 662 C1107 711 1162 670 1144 606 L1088 406
      C1068 327 1032 280 980 280 C931 280 897 310 860 320 H740
      C703 310 669 280 620 280 Z"/>
  </g>

  <!-- Leader lines: above the pad body, below the physical controls/cards. -->
  <g class="wire">
    <path d="M470 157 H545 L605 221"/><path d="M470 225 H545 L605 269"/>
    <path d="M470 293 H610 L760 382"/>
    <!-- One bracket for Left stick/L3, and one for all three D-pad mappings. -->
    <path d="M470 345 H494 V445 H470 M494 395 H535 L590 412 H646"/>
    <path d="M470 481 H494 V649 H470 M494 565 H535 L620 523 H688"/>
    <path d="M1130 157 H1055 L995 221"/><path d="M1130 225 H1035 L995 269"/>
    <path d="M1130 293 H1060 L997 380"/><path d="M1130 361 H1060 L1040 420"/>
    <path d="M1130 429 H1040 L954 420"/><path d="M1130 497 H1035 L997 462"/>
    <path d="M1130 565 H1030 L900 520"/><path d="M1130 633 H1000 L840 382"/>
  </g>

  <!-- Physical controls cover the leader endpoints without hiding their route. -->
  <g filter="url(#shadow)">
    <rect x="570" y="245" width="150" height="48" rx="22" class="control"/>
    <rect x="880" y="245" width="150" height="48" rx="22" class="control"/>
    <rect x="600" y="202" width="90" height="38" rx="18" class="control"/>
    <rect x="910" y="202" width="90" height="38" rx="18" class="control"/>
    <text x="645" y="269" class="controlText">LB / L1</text>
    <text x="955" y="269" class="controlText">RB / R1</text>
    <text x="645" y="221" class="controlText">LT / L2</text>
    <text x="955" y="221" class="controlText">RT / R2</text>

    <circle cx="646" cy="412" r="55" class="control"/>
    <circle cx="646" cy="412" r="31" fill="#263642" stroke="#aab4ba" stroke-width="3"/>
    <text x="646" y="412" class="controlText">LS</text>

    <circle cx="900" cy="520" r="55" class="control"/>
    <circle cx="900" cy="520" r="31" fill="#263642" stroke="#aab4ba" stroke-width="3"/>
    <text x="900" y="520" class="controlText">RS</text>

    <g transform="translate(688 523)">
      <path d="M-19-62 H19 V-19 H62 V19 H19 V62 H-19 V19 H-62 V-19 H-19Z" class="control"/>
      <path d="M0-48 L-9-35 H9Z M48 0 L35-9 V9Z M0 48 L-9 35 H9Z M-48 0 L-35-9 V9Z" fill="#c8d0d4"/>
    </g>

    <g>
      <circle cx="997" cy="380" r="25" fill="#d4ae36" stroke="#f0d77d" stroke-width="3"/>
      <circle cx="1040" cy="421" r="25" fill="#b94742" stroke="#e8847d" stroke-width="3"/>
      <circle cx="954" cy="421" r="25" fill="#3f72ad" stroke="#82a9d4" stroke-width="3"/>
      <circle cx="997" cy="462" r="25" fill="#4e9b62" stroke="#8ac99a" stroke-width="3"/>
      <text x="997" y="380" class="controlText">Y</text><text x="1040" y="421" class="controlText">B</text>
      <text x="954" y="421" class="controlText">X</text><text x="997" y="462" class="controlText">A</text>
    </g>

    <rect x="744" y="365" width="48" height="34" rx="14" class="control"/>
    <rect x="808" y="365" width="48" height="34" rx="14" class="control"/>
    <text x="768" y="382" class="controlText">◧</text><text x="832" y="382" class="controlText">≡</text>
    <circle cx="800" cy="452" r="23" class="control"/>
  </g>

  <!-- Left-side mappings. -->
  <g>
    <rect x="40" y="130" width="430" height="54" rx="12" class="card"/><rect x="56" y="140" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="163" class="key">LT / L2</text><text x="210" y="164" class="action">Item quick-ring</text>
    <rect x="40" y="198" width="430" height="54" rx="12" class="card"/><rect x="56" y="208" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="231" class="key">LB / L1</text><text x="210" y="232" class="action">Map</text>
    <rect x="40" y="266" width="430" height="54" rx="12" class="card"/><rect x="56" y="276" width="170" height="34" rx="17" class="badge"/>
    <text x="141" y="299" class="key">View / Share·Create</text><text x="250" y="290" class="action">Tap: Inventory</text><text x="250" y="311" class="small">Hold: Quest log</text>
    <rect x="40" y="334" width="430" height="54" rx="12" class="card"/><rect x="56" y="344" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="367" class="key">Left stick</text><text x="210" y="368" class="action">Move / turn</text>
    <rect x="40" y="402" width="430" height="54" rx="12" class="card"/><rect x="56" y="412" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="435" class="key">L3</text><text x="210" y="436" class="action">Walk / run</text>
    <rect x="40" y="470" width="430" height="54" rx="12" class="card"/><rect x="56" y="480" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="503" class="key">D-pad ↑</text><text x="210" y="504" class="action">Melee weapon</text>
    <rect x="40" y="538" width="430" height="54" rx="12" class="card"/><rect x="56" y="548" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="571" class="key">D-pad ← / →</text><text x="210" y="572" class="action">Quick slots 1 / 2</text>
    <rect x="40" y="606" width="430" height="54" rx="12" class="card"/><rect x="56" y="616" width="130" height="34" rx="17" class="badge"/>
    <text x="121" y="639" class="key">D-pad ↓</text><text x="210" y="640" class="action">Ranged weapon</text>
  </g>

  <!-- Right-side mappings. -->
  <g>
    <rect x="1130" y="130" width="430" height="54" rx="12" class="card"/><rect x="1146" y="140" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="163" class="key">RT / R2</text><text x="1300" y="164" class="action">Parry</text>
    <rect x="1130" y="198" width="430" height="54" rx="12" class="card"/><rect x="1146" y="208" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="231" class="key">RB / R1</text><text x="1300" y="232" class="action">Magic quick-ring</text>
    <rect x="1130" y="266" width="430" height="54" rx="12" class="card"/><rect x="1146" y="276" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="299" class="key">Y / △</text><text x="1300" y="300" class="action">Draw / sheathe weapon</text>
    <rect x="1130" y="334" width="430" height="54" rx="12" class="card"/><rect x="1146" y="344" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="367" class="key">B / ○</text><text x="1300" y="368" class="action">Jump / climb</text>
    <rect x="1130" y="402" width="430" height="54" rx="12" class="card"/><rect x="1146" y="412" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="435" class="key">X / □</text><text x="1300" y="436" class="action">Sneak</text>
    <rect x="1130" y="470" width="430" height="54" rx="12" class="card"/><rect x="1146" y="480" width="130" height="34" rx="17" class="badge"/>
    <text x="1211" y="503" class="key">A / ✕</text><text x="1300" y="504" class="action">Action / attack</text>
    <rect x="1130" y="538" width="430" height="54" rx="12" class="card"/><rect x="1146" y="548" width="150" height="34" rx="17" class="badge"/>
    <text x="1221" y="571" class="key">Right stick / R3</text><text x="1320" y="562" class="action">Camera / target lock</text><text x="1320" y="583" class="small">Flick: switch target</text>
    <rect x="1130" y="606" width="430" height="54" rx="12" class="card"/><rect x="1146" y="616" width="145" height="34" rx="17" class="badge"/>
    <text x="1218" y="639" class="key">Menu / Options</text><text x="1315" y="630" class="action">Tap: Status</text><text x="1315" y="651" class="small">Hold: Game menu</text>
  </g>

  <!-- Chords. -->
  <g>
    <rect x="70" y="725" width="440" height="78" rx="14" class="card"/>
    <text x="98" y="758" class="footerKey">LB + Menu / L1 + Options</text><text x="98" y="784" class="footerAction">Quick save</text>
    <rect x="580" y="725" width="440" height="78" rx="14" class="card"/>
    <text x="608" y="758" class="footerKey">LB + View / L1 + Share·Create</text><text x="608" y="784" class="footerAction">Quick load</text>
    <rect x="1090" y="725" width="440" height="78" rx="14" class="card"/>
    <text x="1118" y="758" class="footerKey">Hold L3 + R3 (~2 s)</text><text x="1118" y="784" class="footerAction">Teleport when stuck</text>
  </g>

  <text x="800" y="846" class="small" text-anchor="middle">Quick rings: hold, aim with the right stick, then release to use the selected item or spell.</text>
</svg>
